<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — Quintal Místico</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f5f5f5;
    }

    .overall {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      background: #1a2a1a;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .overall.degraded {
      background: #2a2000;
      color: #facc15;
      border-color: #854d0e;
    }

    .overall.down {
      background: #2a1010;
      color: #f87171;
      border-color: #7f1d1d;
    }

    .overall.checking {
      background: #1a1a2a;
      color: #93c5fd;
      border-color: #1e3a5f;
    }

    .services { display: flex; flex-direction: column; gap: 12px; }

    .service {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #444;
    }

    .dot.ok     { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
    .dot.warn   { background: #facc15; box-shadow: 0 0 6px #facc1566; }
    .dot.error  { background: #f87171; box-shadow: 0 0 6px #f8717166; }
    .dot.checking { background: #93c5fd; animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .service-info { flex: 1; }

    .service-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: #e5e5e5;
    }

    .service-detail {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }

    .service-latency {
      font-size: 0.8rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .last-check {
      font-size: 0.75rem;
      color: #444;
    }

    .refresh-btn {
      font-size: 0.75rem;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { color: #aaa; border-color: #555; }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>Status dos serviços</h1>
    <span class="overall checking" id="overall">Verificando...</span>
  </div>

  <div class="services">
    <div class="service" id="svc-cloudflare">
      <div class="dot checking" id="dot-cloudflare"></div>
      <div class="service-info">
        <div class="service-name">Cloudflare</div>
        <div class="service-detail" id="detail-cloudflare">Frontend / CDN</div>
      </div>
      <div class="service-latency" id="latency-cloudflare">—</div>
    </div>

    <div class="service" id="svc-flyio">
      <div class="dot checking" id="dot-flyio"></div>
      <div class="service-info">
        <div class="service-name">Fly.io</div>
        <div class="service-detail" id="detail-flyio">API / Backend</div>
      </div>
      <div class="service-latency" id="latency-flyio">—</div>
    </div>

    <div class="service" id="svc-neon">
      <div class="dot checking" id="dot-neon"></div>
      <div class="service-info">
        <div class="service-name">Neon</div>
        <div class="service-detail" id="detail-neon">Banco de dados</div>
      </div>
      <div class="service-latency" id="latency-neon">—</div>
    </div>
  </div>

  <div class="footer">
    <span class="last-check" id="last-check">—</span>
    <button class="refresh-btn" id="refresh-btn" onclick="runChecks()">↻ Verificar agora</button>
  </div>
</div>

<script>
  const API_URL = 'https://marketplace-mistico.fly.dev/api/health';

  function setService(id, state, detail, latency) {
    const dot = document.getElementById('dot-' + id);
    const detailEl = document.getElementById('detail-' + id);
    const latencyEl = document.getElementById('latency-' + id);

    dot.className = 'dot ' + state;
    if (detail) detailEl.textContent = detail;
    latencyEl.textContent = latency !== null ? latency + ' ms' : '—';
  }

  function setOverall(state) {
    const el = document.getElementById('overall');
    const labels = { ok: 'Operacional', degraded: 'Degradado', down: 'Com falha', checking: 'Verificando...' };
    el.className = 'overall ' + state;
    el.textContent = labels[state] || state;
  }

  async function runChecks() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;

    setOverall('checking');
    ['cloudflare', 'flyio', 'neon'].forEach(id => setService(id, 'checking', null, null));

    // Cloudflare: se esta pagina carregou, o CDN esta vivo.
    // Medimos latencia fazendo fetch de um asset estatico.
    const cfStart = performance.now();
    try {
      await fetch('/favicon.svg', { cache: 'no-store' });
      const cfLatency = Math.round(performance.now() - cfStart);
      setService('cloudflare', 'ok', 'Frontend / CDN', cfLatency);
    } catch {
      setService('cloudflare', 'error', 'Sem resposta', null);
    }

    // Fly.io + Neon: uma única chamada ao /api/health
    const apiStart = performance.now();
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      const apiLatency = Math.round(performance.now() - apiStart);
      const body = await res.json();

      if (res.ok && body?.success) {
        setService('flyio', 'ok', 'API / Backend', apiLatency);

        const dbOk = body?.data?.database === 'connected';
        setService('neon', dbOk ? 'ok' : 'error', 'Banco de dados', dbOk ? apiLatency : null);
      } else {
        setService('flyio', 'warn', 'Respondendo com erro', apiLatency);
        setService('neon', 'warn', 'Estado desconhecido', null);
      }
    } catch {
      const apiLatency = Math.round(performance.now() - apiStart);
      setService('flyio', 'error', 'Sem resposta', apiLatency);
      setService('neon', 'error', 'Inacessível', null);
    }

    // Overall
    const dots = ['cloudflare', 'flyio', 'neon'].map(id =>
      document.getElementById('dot-' + id).className.replace('dot ', '')
    );
    if (dots.every(d => d === 'ok'))          setOverall('ok');
    else if (dots.some(d => d === 'error'))   setOverall('down');
    else                                       setOverall('degraded');

    const now = new Date();
    document.getElementById('last-check').textContent =
      'Última verificação: ' + now.toLocaleTimeString('pt-BR');

    btn.disabled = false;
  }

  runChecks();
  setInterval(runChecks, 60000);
</script>
</body>
</html>
