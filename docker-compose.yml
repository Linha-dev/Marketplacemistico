version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: qm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quintalmistico}
      POSTGRES_USER: ${POSTGRES_USER:-qm_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qm_app} -d ${POSTGRES_DB:-quintalmistico}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API (Node.js / Express) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-qm_app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-quintalmistico}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://quintalmistico.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-https://quintalmistico.com.br}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      EFI_CLIENT_ID: ${EFI_CLIENT_ID:-}
      EFI_CLIENT_SECRET: ${EFI_CLIENT_SECRET:-}
      EFI_PIX_KEY: ${EFI_PIX_KEY:-}
      EFI_WEBHOOK_SECRET: ${EFI_WEBHOOK_SECRET:-}
      EFI_MOCK: ${EFI_MOCK:-false}
      MELHOR_ENVIO_ACCESS_TOKEN: ${MELHOR_ENVIO_ACCESS_TOKEN:-}
      MELHOR_ENVIO_WEBHOOK_SECRET: ${MELHOR_ENVIO_WEBHOOK_SECRET:-}
      MELHOR_ENVIO_MOCK: ${MELHOR_ENVIO_MOCK:-false}
      METRICS_SECRET: ${METRICS_SECRET:-}
      ALERTS_SECRET: ${ALERTS_SECRET:-}
      FINANCE_OPS_SECRET: ${FINANCE_OPS_SECRET:-}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Nginx reverse proxy ──
  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: qm-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
      - certbot_www:/var/www/certbot
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (SSL certificate renewal) ──
  certbot:
    image: certbot/certbot:latest
    container_name: qm-certbot
    volumes:
      - nginx_ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"
    networks:
      - internal

volumes:
  pg_data:
    driver: local
  nginx_ssl:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
