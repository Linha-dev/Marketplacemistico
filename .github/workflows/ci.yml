name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR source/target policy
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          SPRINT_REGEX='^[A-Za-z0-9][A-Za-z0-9-]*/c[0-9]{2}-s[0-9]{2}-[a-z0-9-]+$'
          HOTFIX_REGEX='^[A-Za-z0-9][A-Za-z0-9-]*/hotfix-[0-9]{8}-[a-z0-9-]+$'

          echo "PR base: ${BASE}"
          echo "PR head: ${HEAD}"

          if [[ "${BASE}" == "develop" ]]; then
            if [[ "${HEAD}" == "main" ]]; then
              echo "PR de sincronizacao main -> develop permitido."
              exit 0
            fi

            if [[ ! "${HEAD}" =~ ${SPRINT_REGEX} ]]; then
              echo "PR para develop deve vir de branch no padrao autor/cCC-sSS-descricao."
              exit 1
            fi
          fi

          if [[ "${BASE}" == "main" ]]; then
            if [[ "${HEAD}" == "develop" ]]; then
              echo "PR de release develop -> main permitido."
              exit 0
            fi

            if [[ ! "${HEAD}" =~ ${HOTFIX_REGEX} ]]; then
              echo "PR para main deve vir de develop ou de branch autor/hotfix-YYYYMMDD-descricao."
              exit 1
            fi
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_NO_WARNINGS: '1'

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_NO_WARNINGS: '1'

  e2e-tests:
    name: e2e-tests
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          NODE_NO_WARNINGS: '1'

  deploy:
    name: deploy-fly
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
