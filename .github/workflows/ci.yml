name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR source/target policy
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "PR base: ${BASE}"
          echo "PR head: ${HEAD}"

          if [[ "${BASE}" == "develop" ]]; then
            if [[ ! "${HEAD}" =~ ^sprint/[0-9]{2}(-[a-z0-9-]+)?$ ]]; then
              echo "PR para develop deve vir de branch sprint/NN ou sprint/NN-descricao."
              exit 1
            fi
          fi

          if [[ "${BASE}" == "main" ]]; then
            if [[ "${HEAD}" != "develop" ]]; then
              echo "PR para main deve vir somente da branch develop."
              exit 1
            fi
          fi

  test:
    name: Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run dependency audit (non-blocking)
        run: npm run audit || true

      - name: Run tests
        run: npm test
