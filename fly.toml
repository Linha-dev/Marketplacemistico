app = "marketplace-mistico"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  ALLOWED_ORIGIN = "https://quintalmistico.com.br"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  count = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"
